  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Faustina:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0b0b0b;
      --brand: rgba(221, 213, 196, 0.65);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--brand);
      font-family: 'Faustina', serif;
      font-weight: 400;
    }

    /* ── ISOBAR BG CANVAS ─────────────────────── */
    #isobarCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── LOGO STACK ───────────────────────────── */
    .logo-stack {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.2rem;
      padding: 2rem;
      margin-top: -5vh;
    }

    .logo-combined {
      width: clamp(210px, 27vw, 390px);
      height: auto;
      display: block;
    }

    .logo-combined path {
      fill: var(--brand);
    }

    /* Subtle fade-in so it doesn't pop in jarringly */
    .logo-stack > * {
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 1.2s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

    const gC=[{r:0xDD,g:0xD5,b:0xC4},{r:0xDD,g:0xD5,b:0xC4},{r:0xDD,g:0xD5,b:0xC4}];

    function colorAt(xPos,yPos,cyc){
      if(!isFinite(xPos)||canvas.width===0)return'rgb(255,255,255)';
      const raw=(Math.pow(Math.max(0,Math.min(1,xPos/canvas.width)),colorCurve)+cyc)%2;
      const gp=raw<=1?raw:2-raw,sp=gp*(gC.length-1),ci=Math.floor(sp),ct=sp-ci;
      const i1=Math.max(0,Math.min(ci,gC.length-1)),i2=Math.max(0,Math.min(ci+1,gC.length-1));
      const nv=noise.noise(xPos*randomScale,yPos*randomScale,time*0.05);
      if(isFinite(nv)){
        const nr=((raw+nv*1.5)%2+2)%2,np=nr<=1?nr:2-nr,ns=np*(gC.length-1),ni=Math.floor(ns),nt=ns-ni;
        const ni1=Math.max(0,Math.min(ni,gC.length-1)),ni2=Math.max(0,Math.min(ni+1,gC.length-1));
        return`rgb(${Math.round(gC[ni1].r+(gC[ni2].r-gC[ni1].r)*nt)},${Math.round(gC[ni1].g+(gC[ni2].g-gC[ni1].g)*nt)},${Math.round(gC[ni1].b+(gC[ni2].b-gC[ni1].b)*nt)})`;
      }
      return`rgb(${Math.round(gC[i1].r+(gC[i2].r-gC[i1].r)*ct)},${Math.round(gC[i1].g+(gC[i2].g-gC[i1].g)*ct)},${Math.round(gC[i1].b+(gC[i2].b-gC[i1].b)*ct)})`;
    }

    function draw(){
      ctx.fillStyle=BG;ctx.fillRect(0,0,canvas.width,canvas.height);
      const W=Math.ceil(canvas.width/smoothness),H=Math.ceil(canvas.height/smoothness),vals=[];
      for(let y=0;y<H;y++){vals[y]=[];for(let x=0;x<W;x++)vals[y][x]=noise.noise(x*smoothness*noiseScale,y*smoothness*noiseScale,time);}
      const step=(maxVal-minVal)/(isobarLevels-1),cyc=time*gradientSpeed;
      ctx.lineWidth=lineWidth;
      for(let l=0;l<isobarLevels;l++){
        const lv=minVal+step*l;
        for(let y=0;y<H-1;y++)for(let x=0;x<W-1;x++){
          const v00=vals[y][x],v10=vals[y][x+1],v01=vals[y+1][x],v11=vals[y+1][x+1],s=[];
          if((v00<lv)!==(v10<lv))s.push({x:(x+(lv-v00)/(v10-v00))*smoothness,y:y*smoothness});
          if((v10<lv)!==(v11<lv))s.push({x:(x+1)*smoothness,y:(y+(lv-v10)/(v11-v10))*smoothness});
          if((v01<lv)!==(v11<lv))s.push({x:(x+(lv-v01)/(v11-v01))*smoothness,y:(y+1)*smoothness});
          if((v00<lv)!==(v01<lv))s.push({x:x*smoothness,y:(y+(lv-v00)/(v01-v00))*smoothness});
          if(s.length===2){ctx.strokeStyle=colorAt((s[0].x+s[1].x)/2,(s[0].y+s[1].y)/2,cyc);ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);ctx.lineTo(s[1].x,s[1].y);ctx.stroke();}
        }
      }
      const cx=canvas.width/2,cy=canvas.height/2,mr=Math.sqrt(cx*cx+cy*cy);
      const vg=ctx.createRadialGradient(cx,cy,mr*0.45,cx,cy,mr);
      vg.addColorStop(0,BG+'00');vg.addColorStop(1,BG+'CC');
      ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    function animate(){time+=animSpeed;draw();requestAnimationFrame(animate);}
    animate();
  })();
  </script>
